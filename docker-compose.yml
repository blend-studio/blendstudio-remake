services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: blendstudio_db
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - db_data:/var/opt/mssql
    deploy:
      resources:
        limits:
          memory: 2G # Requisito minimo per MSSQL ma evita che consumi tutto il resto

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: blendstudio_backend
    restart: always
    ports:
      - "8000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - DOTNET_USE_POLLING_FILE_WATCHER=1
    volumes:
      - ./backend:/app
      - /app/bin # Anonymous volume per isolare la build da Windows (velocizza I/O)
      - /app/obj # Anonymous volume per isolare la build da Windows (velocizza I/O)
    depends_on:
      - db
      - mongodb
      - mlflow

  mongodb:
    image: mongo:7.0
    container_name: blendstudio_mongo
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mlflow:
    build:
      context: ./mlflow
    container_name: blendstudio_mlflow
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/app

  analytics:
    build:
      context: ./analytics
    container_name: blendstudio_analytics
    restart: always
    ports:
      - "8001:8000"
    environment:
      - MONGO_CONNECTION_STRING=${MONGO_CONNECTION_STRING}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
    depends_on:
      - mongodb
      - mlflow
    volumes:
      - ./analytics:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blendstudio_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules # Named volume per velocizzare I/O dei moduli

volumes:
  db_data:
  frontend_node_modules:
  mongo_data:
  mlflow_data:
