services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: blendstudio_db
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - db_data:/var/opt/mssql
    deploy:
      resources:
        limits:
          memory: 2G 

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: blendstudio_backend
    restart: always
    ports:
      - "8000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - MONGO_CONNECTION_STRING=${MONGO_CONNECTION_STRING}
      - WRIKE_ACCESS_TOKEN=${WRIKE_ACCESS_TOKEN}
      - DOTNET_USE_POLLING_FILE_WATCHER=1
    volumes:
      - ./backend:/app
      - /app/bin 
      - /app/obj 
    depends_on:
      - db
      - mongodb
      - mlflow

  mongodb:
    image: mongo:7.0
    container_name: blendstudio_mongo
    restart: always
    command: ["--noauth"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mlflow:
    build:
      context: ./mlflow
    container_name: blendstudio_mlflow
    restart: always
    ports:
      - "5000:5000"
    volumes:
      # MODIFICATO: Mappa il volume solo dove MLFlow salva gli esperimenti, 
      # non su tutta l'app (assicurati che corrisponda alla config di MLFlow)
      - mlflow_data:/mlruns 

  analytics:
    build:
      context: ./analytics
    container_name: blendstudio_analytics
    restart: always
    ports:
      - "8001:8000"
    environment:
      - MONGO_CONNECTION_STRING=${MONGO_CONNECTION_STRING:-mongodb://mongodb:27017/blendstudio}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-http://mlflow:5000}
    depends_on:
      - mongodb
      - mlflow
    volumes:
      - ./analytics:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blendstudio_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      # Corretto così. Il browser risolverà localhost.
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000} 
      - VITE_ANALYTICS_BASE_URL=${VITE_ANALYTICS_BASE_URL:-http://localhost:8001}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  db_data:
  frontend_node_modules:
  mongo_data:
  mlflow_data: